<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SICI - Sistema Titulaci&oacute;n{% endblock %}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f5f5f5;
      color: #333333;
      line-height: 1.6;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
    }
    .header {
      background-color: #5c1a1a;
      padding: 30px 40px;
      text-align: center;
    }
    .header h1 {
      color: #ffffff;
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }
    .header p {
      color: #e0c4c4;
      margin: 8px 0 0;
      font-size: 14px;
    }
    .content {
      padding: 40px;
    }
    .content h2 {
      color: #5c1a1a;
      margin: 0 0 16px;
      font-size: 20px;
    }
    .content p {
      margin: 0 0 16px;
      color: #555555;
    }
    .button {
      display: inline-block;
      background-color: #5c1a1a;
      color: #ffffff !important;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      margin: 24px 0;
    }
    .button:hover {
      background-color: #7a2a2a;
    }
    .divider {
      border: none;
      border-top: 1px solid #e5e5e5;
      margin: 24px 0;
    }
    .footer {
      background-color: #f9f9f9;
      padding: 24px 40px;
      text-align: center;
      border-top: 1px solid #e5e5e5;
    }
    .footer p {
      margin: 0;
      font-size: 12px;
      color: #888888;
    }
    .footer a {
      color: #5c1a1a;
      text-decoration: none;
    }
    .info-box {
      background-color: #fef2f2;
      border-left: 4px solid #5c1a1a;
      padding: 16px;
      border-radius: 4px;
      margin: 20px 0;
    }
    .info-box p {
      margin: 0;
      color: #5c1a1a;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>SICI</h1>
      <p>Sistema de Control de Titulaci&oacute;n</p>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>Universidad del Valle &mdash; Sistema SICI</p>
      <p style="margin-top: 8px;">Si tienes alguna duda, contacta a <a href="mailto:siciunivalle@gmail.com">siciunivalle@gmail.com</a></p>
    </div>
  </div>
</body>
</html>
